<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn TV App</title>
    <link rel="manifest" href="/pitv/manifest.json">
    <!-- CRUCIALE LINK: Dit laadt de lokale videospeler in die je in de vorige stap hebt gedownload -->
    <script src="hls.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        video { width: 80%; max-width: 800px; border: 2px solid #333; }
        .channels { margin-top: 20px; }
        button { padding: 10px 20px; margin: 5px; font-size: 18px; cursor: pointer; }
        button:focus { background: red; color: white; outline: none; } /* Cruciaal voor TV-afstandsbediening! */
    </style>
</head>
<body>
    <h1>Mijn Stream App</h1>
    
    <!-- De <source> tag is weggehaald; JavaScript regelt nu het inladen bij de start -->
    <video id="video" controls autoplay width="100%"></video>

    <div class="channels">
        <button onclick="playStream('https://live-vrt.rabah.net/groupc/live/8edf3bdf-7db3-41c3-a318-72cb7f82de66/live_aes.isml/playlist.m3u8')">
            Test Apple Stream
        </button>
    </div>

    <script>
        var video = document.getElementById('video');
        
        function playStream(url) {
            // Controleer of de Hls-bibliotheek succesvol is geladen
            if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Voor browsers die het standaard ondersteunen (zoals Safari/sommige TV-browsers)
                video.src = url;
                video.addEventListener('loadedmetadata', function() { video.play(); });
            } else {
                alert('Fout: De videospeler (Hls.js) kon niet worden geladen.');
            }
        }

        // Zorg dat de teststream automatisch start zodra de pagina opent
        window.addEventListener('DOMContentLoaded', function() {
            playStream('http://smart-hdip.com:6204/lava1/lava1/8568');
        });

        // Service Worker registreren voor PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/pitv/sw.js');
        }
    </script>
</body>
</html>
