<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn TV App (VLC)</title>
    <link rel="manifest" href="/pitv/manifest.json">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .channels { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
        button { padding: 15px 30px; margin: 10px; font-size: 20px; cursor: pointer; background: #222; color: #fff; border: 2px solid #444; width: 300px; border-radius: 8px; }
        button:focus { background: orange; color: black; border-color: #fff; outline: none; } /* Oranje VLC-kleur voor TV-focus */
    </style>
</head>
<body>
    <h1>Mijn Stream App</h1>
    <p>Kies een zender om af te spelen in VLC</p>
    
    <div class="channels">
        <!-- Knop 1: Jouw eigen stream -->
        <button onclick="playInVLC('http://smart-hdip.com')">
            Lava 1 Stream
        </button>
        
        <!-- Knop 2: Apple Test Stream -->
        <button onclick="playInVLC('https://apple.com')">
            Apple Test Stream
        </button>

        <!-- Knop 3: Zelfs de YouTube live link werkt vaak direct in VLC! -->
        <button onclick="playInVLC('https://youtube.com')">
            M1 Híradó (YouTube)
        </button>
    </div>

    <script>
        function playInVLC(streamUrl) {
            // We bouwen een speciale Android Intent URL op
            // Dit dwingt de Android TV stick om de video direct in de VLC app te starten
            var vlcIntent = "intent://" + streamUrl.replace(/^https?:\/\//, "") + 
                            "#Intent;scheme=" + (streamUrl.startsWith("https") ? "https" : "http") + 
                            ";package=org.videolan.vlc;type=video/*;end;";
            
            // Stuur de browser door naar deze link
            window.location.href = vlcIntent;
        }

        // Service Worker registreren voor PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/pitv/sw.js');
        }
    </script>
</body>
</html>
