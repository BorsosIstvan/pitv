<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn TV App</title>
    <link rel="manifest" href="/pitv/manifest.json">
    <script src="hls.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        video { width: 80%; max-width: 800px; border: 2px solid #333; }
        .channels { margin-top: 20px; }
        button { padding: 10px 20px; margin: 5px; font-size: 18px; cursor: pointer; }
        button:focus { background: red; color: white; outline: none; } /* Cruciaal voor TV-afstandsbediening! */
    </style>
</head>
<body>
    <h1>Mijn Stream App</h1>
    <video id="video" controls></video>

    <div class="channels">
        <button onclick="playStream('https://test-streams.mux.dev/x36xhzz/url_6/193039199_mp4_h264_aac_hq_7.m3u8')">Bug Bunny</button>
    </div>
    <div class="channels">
        <button onclick="playStream('https://c201-node61-cdn.connectmedia.hu/110102/7184521041cf54cee9c6548e8d0ba377/64117799/index.m3u8')">M2</button>
    </div>

    <script>
        var video = document.getElementById('video');
        function playStream(url) {
            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() { video.play(); });
            }
        }
        // Service Worker registreren voor PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/pitv/sw.js');
        }
    </script>
</body>
</html>
