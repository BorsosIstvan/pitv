<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn TV App</title>
    <link rel="manifest" href="/pitv/manifest.json">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .channels { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
        button { padding: 15px 30px; margin: 10px; font-size: 20px; cursor: pointer; background: #222; color: #fff; border: 2px solid #444; width: 300px; border-radius: 8px; }
        button:focus { background: red; color: white; outline: none; } /* Focus voor TV-afstandsbediening */
    </style>
</head>
<body>

    <h1>Mijn Stream App</h1>
    <p>Kies een zender om te kijken via VLC:</p>
    
    <div class="channels">
        <!-- Knop 1: Jouw eigen stream -->
        <button onclick="openInVLC('http://smart-hdip.com')">
            Lava 1 Stream
        </button>
        
        <!-- Knop 2: Apple Test Stream -->
        <button onclick="openInVLC('https://apple.com')">
            Apple Test Stream
        </button>
    </div>

    <script>
        function openInVLC(streamUrl) {
            // Dit is de officiële Google Play link-structuur. 
            // TV-browsers herkennen dit wél en sturen de video direct door naar de VLC app!
            var vlcPlayLink = "https://google.com" + encodeURIComponent(streamUrl);
            
            // Open de stream
            window.location.href = vlcPlayLink;
        }

        // Service Worker voor PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/pitv/sw.js');
        }
    </script>

</body>
</html>
