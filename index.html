<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn TV App</title>
    <link rel="manifest" href="/pitv/manifest.json">
    
    <!-- We gebruiken de ingebouwde Hls.js speler rechtstreeks via internet (geen 404 fouten meer) -->
    <script src="hls.min.js"></script>
    
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 20px; margin: 0; }
        video { width: 80%; max-width: 800px; border: 2px solid #333; background: #111; }
        .channels { margin-top: 20px; }
        button { padding: 12px 24px; margin: 5px; font-size: 18px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; }
        button:focus { background: red; color: white; outline: none; } /* Focus voor TV-afstandsbediening */
    </style>
</head>
<body>

    <h1>Mijn Stream App</h1>
    
    <!-- De videospeler -->
    <video id="video" controls autoplay width="100%"></video>
    
    <div class="channels">
        <!-- Knop 1: Jouw eigen stream (loopt via de veilige HTTPS proxy) -->
        <button onclick="playStream('https://cdn.mediaklikk.org:443/rtl/00wMyEjM5UTM')">
            Lava 1 Stream
        </button>
        
        <!-- Knop 2: Apple Test Stream -->
        <button onclick="playStream('https://cdn.mediaklikk.org:443/tv2/00wMyEjM4UTM')">
            Apple Test Stream
        </button>
    </div>

    <script>
        var video = document.getElementById('video');
        var hls;

        function playStream(url) {
            if (hls) {
                hls.destroy();
            }

            var verwerkteUrl = url;

            // We sturen de stream door een proxy die de CORS-blokkade omzeilt
            // Dit werkt perfect voor IPTV-links zoals die van jou!
            if (url.includes('smart-hdip.com') || url.startsWith('http://')) {
                verwerkteUrl = 'https://corsproxy.io?' + encodeURIComponent(url);
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    xhrSetup: function (xhr, url) {
                        xhr.withCredentials = false; // Voorkomt extra beveiligingschecks van de browser
                    }
                });
                hls.loadSource(verwerkteUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(function(error) {
                        console.log("Autoplay geblokkeerd door TV. Druk op de play-knop.");
                    });
                });
                
                // Foutafhandeling toevoegen om te zien wat er gebeurt
                hls.on(Hls.Events.ERROR, function (event, data) {
                    console.log("HLS Fout:", data.details);
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = verwerkteUrl;
            }
        }

        // We starten nu DIRECT met jouw eigen stream in plaats van die van Apple!
        window.addEventListener('DOMContentLoaded', function() {
            playStream('http://smart-hdip.com');
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/pitv/sw.js');
        }
    </script>

</body>
</html>
