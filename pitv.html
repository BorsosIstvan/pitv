<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiTV Ingebouwde Speler</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .video-container {
            max-width: 800px;
            margin: 20px auto;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <h1>PiTV Native Player</h1>
    
    <div class="video-container">
        <!-- De ingebouwde HTML5 speler van Chrome/Safari -->
        <video id="video" controls autoplay muted playsinline>
            <source src="https://c201-node61-cdn.connectmedia.hu/110102/7184521041cf54cee9c6548e8d0ba377/64117799/index.m3u8" type="application/x-mpegURL">
            Je browser ondersteunt deze livestream niet.
        </video>
    </div>

</body>
</html>
